# Security configuration for Nginx

# Hide nginx version
server_tokens off;

# Prevent access to hidden files
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}

# Prevent access to backup files
location ~ ~$ {
    deny all;
    access_log off;
    log_not_found off;
}

# Prevent access to configuration files
location ~* \.(conf|config|ini|log|bak|backup|old|tmp|temp)$ {
    deny all;
    access_log off;
    log_not_found off;
}

# Block common exploit attempts
location ~* (eval\(|base64_decode|gzinflate|rot13|str_rot13) {
    deny all;
    access_log off;
    log_not_found off;
}

# Block SQL injection attempts
location ~* (union.*select|select.*union|select.*from|insert.*into|delete.*from|drop.*table) {
    deny all;
    access_log off;
    log_not_found off;
}

# Block XSS attempts
location ~* (<script|<iframe|<object|<embed|javascript:|vbscript:|onload=|onerror=) {
    deny all;
    access_log off;
    log_not_found off;
}

# Block file upload exploits
location ~* \.(php|php3|php4|php5|phtml|pl|py|jsp|asp|sh|cgi)$ {
    deny all;
    access_log off;
    log_not_found off;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=strict:10m rate=1r/s;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;
limit_conn conn_limit_per_ip 20;

# Request size limits
client_body_buffer_size 1K;
client_header_buffer_size 1k;
client_max_body_size 16M;
large_client_header_buffers 2 1k;

# Timeout settings
client_body_timeout 10;
client_header_timeout 10;
keepalive_timeout 5 5;
send_timeout 10;

# Buffer overflow protection
client_body_buffer_size 1k;
client_header_buffer_size 1k;
large_client_header_buffers 2 1k;

# Block user agents
if ($http_user_agent ~* (nmap|nikto|wikto|sf|sqlmap|bsqlbf|w3af|acunetix|havij|appscan)) {
    return 444;
}

# Block referrer spam
if ($http_referer ~* (babes|forsale|girl|jewelry|love|nudit|organic|poker|porn|sex|teen)) {
    return 444;
}

# Block bad bots
if ($http_user_agent ~* (bot|crawler|spider|scraper)) {
    set $block_bot 1;
}

# Allow good bots
if ($http_user_agent ~* (googlebot|bingbot|slurp|duckduckbot)) {
    set $block_bot 0;
}

if ($block_bot = 1) {
    return 444;
}
