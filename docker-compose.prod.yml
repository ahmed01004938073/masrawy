version: '3.8'

services:
  # Frontend Application
  afleet-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: afleet-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    environment:
      - NODE_ENV=production
    networks:
      - afleet-network
    depends_on:
      - afleet-backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Backend API (Future implementation)
  afleet-backend:
    image: node:18-alpine
    container_name: afleet-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DB_HOST=afleet-database
      - DB_PORT=3306
      - DB_NAME=afleet_store
      - DB_USER=afleet_user
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    volumes:
      - ./backend:/app
      - ./logs/backend:/app/logs
    working_dir: /app
    command: ["npm", "start"]
    networks:
      - afleet-network
    depends_on:
      - afleet-database
      - afleet-redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Database
  afleet-database:
    image: mysql:8.0
    container_name: afleet-database
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=afleet_store
      - MYSQL_USER=afleet_user
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - afleet-db-data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d:ro
      - ./logs/mysql:/var/log/mysql
    ports:
      - "3306:3306"
    networks:
      - afleet-network
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for caching
  afleet-redis:
    image: redis:7-alpine
    container_name: afleet-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - afleet-redis-data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - afleet-network
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Monitoring with Prometheus (Optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: afleet-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - afleet-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'

  # Grafana for dashboards (Optional)
  grafana:
    image: grafana/grafana:latest
    container_name: afleet-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning:ro
    networks:
      - afleet-network

  # Backup service
  backup:
    image: alpine:latest
    container_name: afleet-backup
    restart: unless-stopped
    volumes:
      - afleet-db-data:/backup/database:ro
      - ./backups:/backup/output
      - ./scripts/backup.sh:/backup.sh:ro
    environment:
      - DB_HOST=afleet-database
      - DB_NAME=afleet_store
      - DB_USER=afleet_user
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - afleet-network
    command: sh -c "apk add --no-cache mysql-client && crond -f"
    depends_on:
      - afleet-database

volumes:
  afleet-db-data:
    driver: local
  afleet-redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  afleet-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
